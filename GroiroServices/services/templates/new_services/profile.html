{% extends 'new_services/base.html' %}
{% load static %}
{% load l10n %}

{% block content %}
    <h3 class="text-dark mb-4">{{title}}</h3>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row mb-3">
            <div class="col-lg-4">
                <div class="card mb-3" style="height: 100%;">
                    <div class="card-body text-center shadow">
                        <img class="rounded-circle mb-3 mt-4" id="imgAvatar" src="{{userInfo.avatar.url}}" width="200" height="200" />
                        <div class="mb-3">
                            <input class="form-control" id="getFile" name="avatar" type="file" accept="image/*" style="display: none"/>
                            <button class="btn btn-primary btn-sm" type="button" onclick="document.getElementById('getFile').click()">Заменить изображение...</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="row">
                    <div class="col">
                        <div class="card shadow mb-3" style="height: 100%;">
                            <div class="card-header py-3">
                                <p class="text-primary m-0 fw-bold">Данные о пользователе</p>
                            </div>
                            <div class="card-body">

                                    <div class="row">
                                        <div class="col">
                                            <div class="mb-3">
                                                <label class="form-label" for="username"><strong>Логин</strong></label>
                                                <input id="username" class="form-control" type="text" name="login" value="{{userInfo.user}}" readonly/>
                                            </div>
                                        </div>
                                        <div class="col">
                                            <div class="mb-3">
                                                <label class="form-label" for="email"><strong>Электронная почта</strong></label>
                                                <input id="email" class="form-control" type="email" value="{{userInfo.email}}" name="email" required/>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col">
                                            <div class="mb-3">
                                                <label class="form-label" for="first_name"><strong>Имя, отчество</strong></label>
                                                <input id="first_name" class="form-control" type="text" value="{{userInfo.name}}" name="name" required/>
                                            </div>
                                        </div>
                                        <div class="col">
                                            <div class="mb-3">
                                                <label class="form-label" for="last_name"><strong>Фамилия</strong></label>
                                                <input id="last_name" class="form-control" type="text" value="{{userInfo.surname}}" name="surname" required/>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3"><button class="btn btn-primary btn-sm" type="submit">Сохранить изменения</button></div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
    <script>
        document.getElementById('getFile').onchange = function () {
          var src = URL.createObjectURL(this.files[0]);
          document.getElementById('imgAvatar').src = src;
        }
    </script>
{% endblock %}
